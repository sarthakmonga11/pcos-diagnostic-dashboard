[theme]
primaryColor = "#C2185B"
backgroundColor = "#FDF4F8"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1C1C2E"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false

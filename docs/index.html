<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>PCOS Diagnostic Analytics Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.63.1/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@stlite/browser@0.63.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          // Define all external Python dependencies required by the application
          requirements: ["pandas", "scikit-learn", "matplotlib", "seaborn", "xgboost", "shap"], 
          entrypoint: "Home.py", // Defines the main execution script
          files: {
            // Map the virtual WASM file system to the actual GitHub repository paths
            "Home.py": { url: "../app/Home.py" },
            "pages/1_Phenotype_Explorer.py": { url: "../app/pages/1_Phenotype_Explorer.py" },
            "pages/2_Risk_Calculator.py": { url: "../app/pages/2_Risk_Calculator.py" },
            "pages/3_Feature_Impact.py": { url: "../app/pages/3_Feature_Impact.py" }
          },
        },
        document.getElementById("root") // Target the div defined above
      );
    </script>
  </body>
</html>
